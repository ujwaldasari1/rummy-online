<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#060e1a" />
    <meta name="description" content="Chalaragers - Online Multiplayer Indian Rummy" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Chalaragers · Indian Rummy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { background: #060e1a; overflow-x: hidden; font-family: 'DM Sans', sans-serif; }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-thumb { background: rgba(191,155,80,0.35); border-radius: 6px; }
      ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 6px; }

      .draggable { touch-action: manipulation; }
      body.is-dragging { overflow: hidden !important; touch-action: none; }
      body.is-dragging * { user-select: none !important; -webkit-user-select: none !important; }

      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes spin { to { transform: rotate(360deg); } }

      @keyframes breathe {
        0%, 100% { box-shadow: 0 0 8px rgba(56,193,114,0.2), 0 0 20px rgba(56,193,114,0.05); }
        50% { box-shadow: 0 0 16px rgba(56,193,114,0.4), 0 0 40px rgba(56,193,114,0.1); }
      }

      @keyframes shineSweep {
        0% { left: -100%; }
        100% { left: 200%; }
      }

      @keyframes fadeSlideUp {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      @keyframes glowPulse {
        0%, 100% { box-shadow: 0 0 12px rgba(212,175,55,0.3); }
        50% { box-shadow: 0 0 28px rgba(212,175,55,0.6), 0 0 50px rgba(212,175,55,0.15); }
      }

      @keyframes wildShimmer {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
